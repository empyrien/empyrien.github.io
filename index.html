<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empyrien</title>
<meta name="description" content="Empyrien — you found us.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0e;
    --ink: #e9e4da;
    --ink-dim: #8a857b;
    --hairline: rgba(233, 228, 218, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Cormorant Garamond', Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* faint radial glow behind the wordmark */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 60% 45% at 50% 42%, rgba(233, 228, 218, 0.05), transparent 70%);
    pointer-events: none;
  }

  main {
    padding: 2rem;
    animation: rise 1.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  h1 {
    font-weight: 300;
    font-size: clamp(3rem, 9vw, 6.5rem);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-left: 0.22em; /* offset letter-spacing on last char */
    line-height: 1.1;
  }

  .rule {
    width: 3.5rem;
    height: 1px;
    background: var(--hairline);
    margin: 2.25rem auto;
  }

  p {
    font-style: italic;
    font-weight: 300;
    font-size: clamp(1.05rem, 2.2vw, 1.35rem);
    letter-spacing: 0.08em;
    color: var(--ink-dim);
  }

  .links {
    display: flex;
    gap: 2.75rem;
    justify-content: center;
  }

  .x-handle {
    display: inline-block;
    margin-top: 2.75rem;
    font-style: normal;
    font-weight: 300;
    font-size: 0.95rem;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.3s ease, border-color 0.3s ease;
  }

  .x-handle:hover {
    color: var(--ink);
    border-bottom-color: var(--hairline);
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    main { animation: none; }
  }
</style>
</head>
<body>
<main>
  <h1>Empyrien</h1>
  <div class="rule"></div>
  <p>you found us</p>
  <div class="links">
    <a class="x-handle" href="/vision/">the vision</a>
    <a class="x-handle" href="https://x.com/empyrien" target="_blank" rel="noopener">@empyrien</a>
  </div>
</main>
</body>
</html>
